[tox]
skipsdist = True
usedevelop = True

envlist =
    python{3.10,3.11,3.12,3.13}-django{4.2}-wagtail{6.3,7.0}-{sqlite,postgres}
    python{3.12,3.13,3.14}-django{5.2}-wagtail{6.3,7.0,7.2}-{sqlite,postgres}
    python{3.14}-django{6.0}-wagtail{7.2}-{sqlite,postgres}

[gh-actions]
python =
    3.10: python3.10
    3.11: python3.11
    3.12: python3.12
    3.13: python3.13
    3.14: python3.14

[gh-actions:env]
DB =
    sqlite: sqlite
    postgres: postgres

[testenv]
install_command = python -m pip install -e ".[testing,linting,type-checking]" -U {opts} {packages}
commands = pytest {posargs: -vv} --cov-config=pyproject.toml --cov --cov-report=json --cov-report=term-missing:skip-covered

basepython =
    python3.10: python3.10
    python3.11: python3.11
    python3.12: python3.12
    python3.13: python3.13
    python3.14: python3.14

deps =
    coverage

    django4.2: Django>=4.2,<4.3
    django5.2: Django>=5.2,<5.3
    django6.0: Django>=6.0,<6.1

    wagtail6.3: wagtail>=6.3,<6.4
    wagtail7.0: wagtail>=7.0,<7.1
    wagtail7.2: wagtail>=7.2,<7.3

setenv =
    postgres: DATABASE_URL={env:DATABASE_URL:postgres://user:password@0.0.0.0:5432/db}
    COVERAGE_FILE={toxworkdir}/.coverage.{envname}

[testenv:interactive]
basepython = python3.13

commands_pre =
    python {toxinidir}/tests/manage.py makemigrations
    python {toxinidir}/tests/manage.py migrate
    python {toxinidir}/tests/manage.py shell -c "from django.contrib.auth.models import User;(not User.objects.filter(username='admin').exists()) and User.objects.create_superuser('admin', 'super@example.com', 'changeme')"
    python {toxinidir}/tests/manage.py createcachetable

commands =
    {posargs:python tests/manage.py runserver 0.0.0.0:8020}

setenv =
    INTERACTIVE = 1
